<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/Everything-About-Freya/">
<title>王静怡 Jingyi Wang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF7F2;--blush:#F2C4C4;--rose:#D48B8B;--mauve:#C9A0C0;--lilac:#B8A9D9;--sage:#A8C5B5;--peach:#F0C8A8;--warm-grey:#9C9289;--text-dark:#3A3038}
html,body{width:100%;height:100%;overflow:hidden;background:var(--cream);font-family:'DM Sans',sans-serif;cursor:none}
.cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--rose);pointer-events:none;transform:translate(-50%,-50%);transition:transform .1s ease,width .2s,height .2s,background .2s;z-index:9999}
.cursor.hover{width:28px;height:28px;background:var(--mauve);opacity:.7}
.bg{position:fixed;inset:0;z-index:0;background:var(--cream);overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45;animation:drift 14s ease-in-out infinite alternate}
.blob-1{width:500px;height:500px;background:var(--blush);top:-10%;left:-5%;animation-duration:18s}
.blob-2{width:400px;height:400px;background:var(--lilac);bottom:-10%;right:-5%;animation-duration:22s;animation-delay:-8s}
.blob-3{width:300px;height:300px;background:var(--sage);top:40%;left:60%;animation-duration:16s;animation-delay:-4s}
.blob-4{width:250px;height:250px;background:var(--peach);top:10%;right:20%;animation-duration:20s;animation-delay:-12s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.08)}}
.grain{position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='%23f5f5f5' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");background-size:256px 256px;pointer-events:none}
.scene{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;animation:fade-in 1.2s ease both}
@keyframes fade-in{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.avatar-wrap{position:relative;width:190px;height:190px;flex-shrink:0;z-index:10;animation:float-center 5s ease-in-out infinite alternate}
@keyframes float-center{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.avatar-ring{position:absolute;inset:-8px;border-radius:50%;border:1.5px solid rgba(212,139,139,.35);animation:spin-slow 20s linear infinite}
.avatar-ring::before{content:'';position:absolute;top:-4px;left:50%;width:8px;height:8px;background:var(--rose);border-radius:50%;transform:translateX(-50%)}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.avatar-img{width:190px;height:190px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 8px 40px rgba(180,140,150,.25);display:block}
.name-tag{position:absolute;bottom:-68px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
.name-tag h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--text-dark);letter-spacing:.05em}
.name-tag p{font-size:11px;font-weight:300;color:var(--warm-grey);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
.bubble{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:none;text-decoration:none;transition:transform .35s cubic-bezier(.34,.1,.68,.55);z-index:5}
.bubble:hover{transform:scale(1.15)!important;box-shadow:0 16px 48px rgba(0,0,0,.13)!important}
.bubble-icon{font-size:20px;margin-bottom:4px;display:block}
.bubble-label{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;opacity:.85;text-align:center;line-height:1.4}
@keyframes float-bubble{0%{transform:translateY(0) translateX(0)}33%{transform:translateY(-12px) translateX(4px)}66%{transform:translateY(5px) translateX(-4px)}100%{transform:translateY(-8px) translateX(0)}}
.b-about{width:108px;height:108px;background:rgba(240,200,168,.70);color:#8B5C3A;box-shadow:0 6px 28px rgba(240,200,168,.40);backdrop-filter:blur(6px);animation:float-bubble 7s ease-in-out infinite;animation-delay:0s}
.b-work{width:128px;height:128px;background:rgba(232,180,184,.72);color:#7A3A42;box-shadow:0 6px 28px rgba(232,180,184,.40);backdrop-filter:blur(6px);animation:float-bubble 8s ease-in-out infinite;animation-delay:-1.5s}
.b-education{width:114px;height:114px;background:rgba(184,169,217,.68);color:#4A3A7A;box-shadow:0 6px 28px rgba(184,169,217,.38);backdrop-filter:blur(6px);animation:float-bubble 6s ease-in-out infinite;animation-delay:-3s}
.b-skills{width:104px;height:104px;background:rgba(168,197,181,.68);color:#3A6B55;box-shadow:0 6px 28px rgba(168,197,181,.38);backdrop-filter:blur(6px);animation:float-bubble 9s ease-in-out infinite;animation-delay:-0.8s}
.b-projects{width:116px;height:116px;background:rgba(201,160,192,.68);color:#6A3A62;box-shadow:0 6px 28px rgba(201,160,192,.38);backdrop-filter:blur(6px);animation:float-bubble 7.5s ease-in-out infinite;animation-delay:-2s}
.b-contact{width:96px;height:96px;background:rgba(242,196,196,.68);color:#7A3A3A;box-shadow:0 6px 28px rgba(242,196,196,.38);backdrop-filter:blur(6px);animation:float-bubble 8.5s ease-in-out infinite;animation-delay:-4s}
.socials{position:fixed;top:28px;right:36px;z-index:10;display:flex;gap:18px;align-items:center}
.socials a{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--warm-grey);text-decoration:none;transition:color .2s;font-weight:400}
.socials a:hover{color:var(--rose)}
.lang-toggle{position:fixed;top:28px;left:36px;z-index:10}
.lang-btn{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:100px;border:1px solid rgba(212,139,139,.4);background:transparent;color:var(--warm-grey);cursor:pointer;transition:all .2s}
.lang-btn:hover{background:var(--rose);color:#fff}
.hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--warm-grey);animation:pulse-hint 3s ease-in-out infinite}
@keyframes pulse-hint{0%,100%{opacity:.4}50%{opacity:.9}}
.overlay{position:fixed;inset:0;background:var(--cream);z-index:9998;transform:scaleY(0);transform-origin:bottom;pointer-events:none}
.overlay.exit{animation:curtain-up .55s cubic-bezier(.76,0,.24,1) forwards}
@keyframes curtain-up{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="overlay" id="overlay"></div>
<div class="bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div><div class="blob blob-4"></div></div>
<div class="grain"></div>
<div class="lang-toggle"><button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button></div>
<nav class="socials">
  <a href="mailto:jingyi.wang.22@alumni.ucl.ac.uk">Email</a>
  <a href="https://github.com/freyawang123" target="_blank">GitHub</a>
</nav>
<div class="hint" id="hint">点击泡泡探索 ✦</div>
<div class="scene" id="scene"></div>

<script>
const T = {
  zh:{
    name:'王静怡',subtitle:'数据分析 · 数字营销 · UCL硕士',
    hint:'点击泡泡探索 ✦',
    bubbles:[
      {cls:'b-about',    icon:'🌸', label:'关于我',   href:'about.html'},
      {cls:'b-work',     icon:'💼', label:'工作经历', href:'work.html'},
      {cls:'b-education',icon:'🎓', label:'教育背景', href:'education.html'},
      {cls:'b-skills',   icon:'⚡', label:'专业技能', href:'skills.html'},
      {cls:'b-projects', icon:'✦',  label:'项目经历', href:'projects.html'},
      {cls:'b-contact',  icon:'📬', label:'联系我',   href:'contact.html'},
    ]
  },
  en:{
    name:'Jingyi Wang',subtitle:'Data Analytics · Digital Marketing · UCL MSc',
    hint:'Click a bubble to explore ✦',
    bubbles:[
      {cls:'b-about',    icon:'🌸', label:'About',    href:'about.html'},
      {cls:'b-work',     icon:'💼', label:'Experience',href:'work.html'},
      {cls:'b-education',icon:'🎓', label:'Education', href:'education.html'},
      {cls:'b-skills',   icon:'⚡', label:'Skills',    href:'skills.html'},
      {cls:'b-projects', icon:'✦',  label:'Projects',  href:'projects.html'},
      {cls:'b-contact',  icon:'📬', label:'Contact',   href:'contact.html'},
    ]
  }
};

let lang = localStorage.getItem('lang')||'zh';

function toggleLang(){
  lang = lang==='zh'?'en':'zh';
  localStorage.setItem('lang',lang);
  document.getElementById('langBtn').textContent = lang==='zh'?'EN':'中';
  render();
}

function render(){
  const d = T[lang];
  document.getElementById('hint').textContent = d.hint;
  document.documentElement.lang = lang==='zh'?'zh':'en';
  buildScene(d);
}

const cursor = document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px'});

function buildScene(d){
  const scene = document.getElementById('scene');
  scene.innerHTML='';
  // Avatar
  const aw = document.createElement('div');
  aw.className='avatar-wrap';
  aw.innerHTML=`<div class="avatar-ring"></div><img class="avatar-img" src="https://avatars.githubusercontent.com/u/115036419?v=4" alt="${d.name}"><div class="name-tag"><h1>${d.name}</h1><p>${d.subtitle}</p></div>`;
  scene.appendChild(aw);

  // Bubbles
  const vw=window.innerWidth, vh=window.innerHeight;
  const cx=vw/2, cy=vh/2;
  const r=Math.min(vw,vh)*0.30;
  d.bubbles.forEach((b,i)=>{
    const angle=(i/d.bubbles.length)*2*Math.PI-Math.PI/2;
    const bx=cx+Math.cos(angle)*r*1.15;
    const by=cy+Math.sin(angle)*r*0.9;
    const el=document.createElement('a');
    el.className=`bubble ${b.cls}`;
    el.href=b.href;
    el.innerHTML=`<span class="bubble-icon">${b.icon}</span><span class="bubble-label">${b.label}</span>`;
    scene.appendChild(el);
    const w=el.offsetWidth, h=el.offsetHeight;
    el.style.position='absolute';
    el.style.left=(bx-w/2)+'px';
    el.style.top=(by-h/2)+'px';
    el.style.animationDelay=(i*-1.2)+'s';
    el.addEventListener('click',function(e){
      e.preventDefault();
      document.getElementById('overlay').classList.add('exit');
      setTimeout(()=>{window.location.href=this.href},520);
    });
    el.addEventListener('mouseenter',()=>cursor.classList.add('hover'));
    el.addEventListener('mouseleave',()=>cursor.classList.remove('hover'));
  });
}

document.getElementById('langBtn').textContent = lang==='zh'?'EN':'中';
render();
window.addEventListener('resize',render);
</script>
</body>
</html>
