<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>项目经历 — 王静怡</title>
<link rel="stylesheet" href="shared.css">
<style>
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
.filter-btn{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:7px 18px;border-radius:100px;border:1px solid rgba(212,139,139,.3);background:transparent;color:var(--warm-grey);cursor:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-btn:hover,.filter-btn.active{background:var(--rose);color:#fff;border-color:var(--rose)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:24px}
.proj-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;overflow:hidden;backdrop-filter:blur(10px);transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;cursor:none}
.proj-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 20px 56px rgba(180,140,150,.18)}
.proj-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.proj-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(250,247,242,.4))}
.proj-body{padding:18px 22px 22px}
.proj-category{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--rose);font-weight:500;margin-bottom:5px}
.proj-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--text-dark);line-height:1.25;margin-bottom:8px}
.proj-desc{font-size:13px;color:var(--text-mid);line-height:1.7;font-weight:300;margin-bottom:12px}
.kpi-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.kpi{font-size:11px;font-weight:500;color:var(--rose);background:rgba(212,139,139,.1);border:1px solid rgba(212,139,139,.2);border-radius:100px;padding:3px 10px}
.proj-footer{display:flex;gap:12px}
.proj-link{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:gap .2s}
.proj-link:hover{gap:10px}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="overlay" id="overlay"></div>
<div class="bg"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
<div class="grain"></div>
<nav class="site-nav">
  <a class="nav-logo" href="index.html">Jingyi <span>Wang</span></a>
  <div class="nav-links">
    <a href="about.html" data-zh="关于我" data-en="About">关于我</a>
    <a href="education.html" data-zh="教育背景" data-en="Education">教育背景</a>
    <a href="work.html" data-zh="工作经历" data-en="Experience">工作经历</a>
    <a href="projects.html" class="active" data-zh="项目经历" data-en="Projects">项目经历</a>
    <a href="skills.html" data-zh="专业技能" data-en="Skills">专业技能</a>
    <a href="contact.html" data-zh="联系我" data-en="Contact">联系我</a>
    <button class="lang-btn" id="langBtn">EN</button>
  </div>
</nav>
<main class="page-main">
  <a class="back-link" href="index.html" data-zh="首页" data-en="Home">首页</a>
  <header class="page-header reveal">
    <p class="page-eyebrow" data-zh="项目经历" data-en="Portfolio">项目经历</p>
    <h1 class="page-title" data-zh="我做过的<em>项目</em>" data-en="Things I've <em>built</em>">我做过的<em>项目</em></h1>
    <p class="page-subtitle" data-zh="涵盖广告投放优化、CRM数据运营与空间数据研究。" data-en="Spanning paid advertising optimisation, CRM data operations, and spatial data research.">涵盖广告投放优化、CRM数据运营与空间数据研究。</p>
  </header>

  <div class="filter-bar reveal">
    <button class="filter-btn active" onclick="filterProjects('all',this)" data-zh="全部" data-en="All">全部</button>
    <button class="filter-btn" onclick="filterProjects('ads',this)" data-zh="广告投放" data-en="Advertising">广告投放</button>
    <button class="filter-btn" onclick="filterProjects('crm',this)" data-zh="CRM运营" data-en="CRM">CRM运营</button>
    <button class="filter-btn" onclick="filterProjects('spatial',this)" data-zh="空间分析" data-en="Spatial">空间分析</button>
  </div>

  <div class="projects-grid reveal" id="projects-grid"></div>
</main>

<script>
const PROJECTS = [
  {
    cat:'ads',
    emoji:'📱',
    bg:'linear-gradient(135deg,rgba(232,180,184,.45),rgba(242,196,196,.3))',
    catZh:'广告投放运营', catEn:'Advertising Operations',
    titleZh:'特定IP相关消费者的投放细化',
    titleEn:'Targeted Advertising for IP-Related Consumers',
    descZh:'针对IP产品受众高度垂直的特性，优化投放人群包和标题主图设计，确保爆款稳基本盘，IP拉新，通过全链路差异化避免内耗，实现增量而非转移。',
    descEn:'Optimised targeting and creatives for vertical IP audiences to sustain bestsellers and drive new customer acquisition via full-funnel differentiation to prevent cannibalisation.',
    kpis:['IP CVR +1.3%','全店转化率 +1% / Store CVR +1%'],
    tags:[{t:'天猫广告 / Tmall Ads',cls:'tag'},{t:'人群包优化',cls:'tag sage'},{t:'ROI优化',cls:'tag lilac'}],
    period:'2025.10 – 2026.03'
  },
  {
    cat:'ads',
    emoji:'💬',
    bg:'linear-gradient(135deg,rgba(240,200,168,.4),rgba(201,160,192,.25))',
    catZh:'数据运营', catEn:'Data Operations',
    titleZh:'投放结构优化 · 朋友圈广告',
    titleEn:'Audience Targeting Optimisation · WeChat Moments',
    descZh:'通过分析品牌客户的消费习惯，参考竞品爆款广告图优化商品素材，将30%预算转向"货找人"+"人找货"双场景，配合店铺自播与达人切片二次分发，利用商品卡免偎。',
    descEn:'Analysed customer purchasing habits and benchmarked competitor top-performing ad creatives; refined audience targeting for Valentine's Day gifting demand, resulting in incremental GMV.',
    kpis:['自然流量 +40%','ROI 1.8 → 2.7'],
    tags:[{t:'朋友圈广告',cls:'tag'},{t:'预算优化',cls:'tag peach'},{t:'GMV增长',cls:'tag sage'}],
    period:'2025.04 – 2025.05'
  },
  {
    cat:'crm',
    emoji:'🎯',
    bg:'linear-gradient(135deg,rgba(184,169,217,.38),rgba(201,160,192,.3))',
    catZh:'CRM运营', catEn:'CRM Operations',
    titleZh:'品牌招新链路转化与派样',
    titleEn:'Brand Acquisition Funnel & Sampling Campaign',
    descZh:'基于天猫平台用户的消费倾向和意愿，结合品牌战略趋势发展，调整小样内容和优惠券门槛，通过精细化派样引导新客首单；整体ROI提高至3.5，复购券使用率提高至2%。',
    descEn:'Based on Tmall user purchasing intent and brand strategy, adjusted sampling content and coupon thresholds to guide new customers to first purchase via targeted sampling.',
    kpis:['ROI → 3.5','复购券使用率 +2%'],
    tags:[{t:'会员运营',cls:'tag mauve'},{t:'派样策略',cls:'tag lilac'},{t:'天猫',cls:'tag'}],
    period:'2025.02 – 2025.04'
  },
  {
    cat:'spatial',
    emoji:'🗺️',
    bg:'linear-gradient(135deg,rgba(168,197,181,.42),rgba(184,169,217,.28))',
    catZh:'科研调研', catEn:'Research',
    titleZh:'地理信息系统的选址 · 科研调研',
    titleEn:'GIS-Based Site Selection for Community Centers',
    descZh:'以数据为导向，优化伦敦市内社区中心的路网结构。与威斯敏斯特议会深度合作，通过算法预测居民通勤需求，基于Python和R实现空间数据定量分析，并通过JavaScript实现产出的在线可视化，最终交付一个轻量化的路网选址系统。',
    descEn:'Data-driven optimisation of road network structure for community centres in London. Partnered with Westminster City Council; performed quantitative spatial data analysis with Python and R, and delivered an online visualisation tool built with JavaScript.',
    kpis:['Westminster City Council 合作','Python + R + JavaScript'],
    tags:[{t:'Python',cls:'tag sage'},{t:'R',cls:'tag lilac'},{t:'GIS',cls:'tag'},{t:'JavaScript',cls:'tag peach'}],
    period:'2023.05 – 2023.08',
    github:'https://github.com/freyawang123'
  }
];

function renderCards(list){
  const grid = document.getElementById('projects-grid');
  const lang = localStorage.getItem('lang')||'zh';
  grid.innerHTML = list.map((p,i)=>`
    <div class="proj-card" data-cat="${p.cat}" style="animation:reveal-up .6s ease ${i*0.1}s both">
      <div class="proj-thumb" style="background:${p.bg}">${p.emoji}</div>
      <div class="proj-body">
        <div class="proj-category">${lang==='zh'?p.catZh:p.catEn}</div>
        <div class="proj-title">${lang==='zh'?p.titleZh:p.titleEn}</div>
        <p class="proj-desc">${lang==='zh'?p.descZh:p.descEn}</p>
        <div class="kpi-row">${p.kpis.map(k=>`<span class="kpi">${k}</span>`).join('')}</div>
        <div style="margin-bottom:12px">${p.tags.map(t=>`<span class="${t.cls}">${t.t}</span>`).join('')}</div>
        <div class="proj-footer">
          <span style="font-size:11px;color:var(--warm-grey)">${p.period}</span>
          ${p.github?`<a class="proj-link" href="${p.github}" target="_blank">GitHub →</a>`:''}
        </div>
      </div>
    </div>
  `).join('');
}

function filterProjects(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat==='all'?PROJECTS:PROJECTS.filter(p=>p.cat===cat));
}

renderCards(PROJECTS);

// re-render on lang change
const origApply = window._applyLang;
const observer = new MutationObserver(()=>{ renderCards(PROJECTS); });
observer.observe(document.documentElement,{attributes:true,attributeFilter:['lang']});
</script>
<script src="_nav.js"></script>
</body>
</html>
