<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>联系我 — 王静怡</title>
<link rel="stylesheet" href="shared.css">
<style>
.contact-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:52px;align-items:start}
.contact-left p{font-size:15px;color:var(--text-mid);line-height:1.8;margin-bottom:28px;font-weight:300}
.contact-links{display:flex;flex-direction:column;gap:14px}
.contact-item{display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:16px;background:var(--card-bg);border:1px solid var(--card-border);text-decoration:none;backdrop-filter:blur(10px);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;cursor:none}
.contact-item:hover{transform:translateX(6px);box-shadow:0 8px 28px rgba(180,140,150,.15)}
.c-icon{font-size:20px;flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.c-icon.email{background:rgba(212,139,139,.15)}
.c-icon.github{background:rgba(184,169,217,.15)}
.c-icon.wechat{background:rgba(168,197,181,.15)}
.c-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--warm-grey);margin-bottom:3px}
.c-value{font-size:14px;color:var(--text-dark);font-weight:400}
.contact-right{position:sticky;top:110px}
.status-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:26px 28px;backdrop-filter:blur(10px);margin-bottom:18px}
.avail-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.avail-status{font-size:12px;color:#3A6B55;font-weight:500;letter-spacing:.06em;margin-bottom:14px}
.avail-text{font-size:14px;color:var(--text-mid);line-height:1.7;font-weight:300}
.location-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:22px 26px;backdrop-filter:blur(10px)}
.loc-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--warm-grey);margin-bottom:8px}
.loc-value{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text-dark)}
@media(max-width:620px){.contact-layout{grid-template-columns:1fr}.contact-right{position:static}}
</style>
</head>
<body>
